<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekend Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
        }

        .container {
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .countdown-box {
            font-size: 8rem;
            font-weight: bold;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin: 20px 0;
        }

        .label {
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-top: 40px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .countdown-box { font-size: 5rem; }
            .label { font-size: 1.5rem; }
            .subtitle { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Countdown to Weekend</h1>
        <div class="countdown-box" id="hours">-- hours</div>
        <div class="label">Time Left Until Friday 5 PM</div>
        <div class="subtitle">Just keep the rhythm going!</div>
    </div>

    <script>
        function getWeekendCountdown() {
            const now = new Date();
            let weekendStart = new Date(now);
            
            // Get next Friday
            const currentDay = now.getDay(); // 0=Sun, 6=Sat
            const daysUntilFriday = (5 - currentDay + 7) % 7;
            
            weekendStart.setDate(now.getDate() + daysUntilFriday);
            weekendStart.setHours(17, 0, 0, 0); // Friday at 5 PM
            
            // If today is past Friday 5 PM this week, count to next week's Friday 5 PM
            if (now.getTime() >= weekendStart.getTime()) {
                weekendStart.setDate(weekendStart.getDate() + 7);
            }
            
            const diff = weekendStart - now;
            return Math.floor(diff / (1000 * 60 * 60)); // Convert to hours
        }

        function updateCountdown() {
            const hoursLeft = getWeekendCountdown();
            document.getElementById('hours').textContent = hoursLeft + ' hours';
            
            if (hoursLeft <= 0) {
                document.getElementById('hours').textContent = 'The Weekend!';
            }
        }

        // Update every second
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
